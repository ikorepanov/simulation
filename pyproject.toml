[project]
name = "simulation"
version = "0.1.0"
description = "The second project of Sergey Zhukov's roadmap"
readme = "README.md"
authors = [
    { name = "ikorepanov" }
]
requires-python = ">=3.11"
dependencies = [
    "pygame>=2.6.1",
]

[project.scripts]
simulation = "simulation:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/simulation"]

[dependency-groups]
dev = [
    "flake8>=7.1.1",
    "isort>=5.13.2",
    "mypy>=1.13.0",
]

[tool.isort]
profile = "black"

[tool.flake8]
max-line-length = 79
extend-ignore = [
    "E203",  # Имеет конфликт с black
    "W503",  # Логические операторы на новой строке
]

[tool.mypy]
python_version = "3.11"
strict = false
warn_unused_configs = true
exclude = ["venv", ".venv", "alembic"]
follow_imports = "silent"
warn_redundant_casts = true
warn_unused_ignores = true
disallow_any_generics = true
check_untyped_defs = true
no_implicit_reexport = true
ignore_missing_imports = true
disallow_untyped_defs = true
