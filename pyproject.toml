[project]
name = "simulation"
version = "0.1.0"
description = "The second project of Sergey Zhukov's roadmap"
readme = "README.md"
authors = [
    { name = "ikorepanov" }
]
requires-python = ">=3.11"
dependencies = [
    "pygame>=2.6.1",
    "ruff>=0.8.2",
]

[project.scripts]
simulation = "simulation:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
